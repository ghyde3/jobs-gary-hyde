<!-- @dsCard group="Components" viewport="700x160" name="Core — NavBar" subtitle="Sticky navigation: logo, links, CTA, scroll-aware blur" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg); }
  .demo { position: relative; height: 60px; overflow: hidden; border: 1px solid var(--border); border-radius: var(--radius-md); margin: 16px; }
  .demo-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-4); margin: 16px 16px 6px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { NavBar, Button } = window.GaryHydeDesignSystem_f38a16;

function Preview() {
  const logo = (
    <span style={{display:'flex',alignItems:'center',gap:'8px'}}>
      <img src="../../assets/logo.svg" width={28} height={28} alt="GH" />
      <span style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'var(--text-sm)',letterSpacing:'-0.02em',color:'var(--text-1)'}}>Gary Hyde</span>
    </span>
  );
  return (
    <div>
      <div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text-4)',padding:'14px 16px 6px',letterSpacing:'0.06em'}}>NAVBAR — at top (transparent)</div>
      <div style={{position:'relative',height:'60px',border:'1px solid var(--border)',borderRadius:'var(--radius-md)',margin:'0 16px',overflow:'hidden',background:'linear-gradient(135deg,#111113 0%,#09090B 100%)'}}>
        <NavBar
          logo={logo}
          links={[{label:'Work',href:'/work'},{label:'About',href:'/about'},{label:'Writing',href:'/writing'}]}
          cta={<Button variant="primary" size="sm">Get in touch</Button>}
          currentPath="/work"
        />
      </div>
      <div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text-4)',padding:'14px 16px 6px',letterSpacing:'0.06em'}}>NAVBAR — scrolled (opaque + blur)</div>
      <div style={{position:'relative',height:'60px',border:'1px solid var(--border)',borderRadius:'var(--radius-md)',margin:'0 16px',overflow:'hidden'}}>
        <div style={{position:'absolute',top:0,left:0,right:0,height:'60px',display:'flex',alignItems:'center',padding:'0 24px',background:'rgba(9,9,11,0.88)',borderBottom:'1px solid var(--border)',backdropFilter:'blur(12px)'}}>
          {logo}
          <div style={{marginLeft:'auto',display:'flex',gap:'4px'}}>
            {['Work','About','Writing'].map(l=>(
              <a key={l} href="#" style={{padding:'0 12px',height:'34px',display:'inline-flex',alignItems:'center',fontSize:'var(--text-sm)',color:l==='Work'?'var(--text-1)':'var(--text-3)',textDecoration:'none',borderRadius:'var(--radius-sm)',fontFamily:'var(--font-body)'}}>{l}</a>
            ))}
          </div>
          <div style={{marginLeft:'16px'}}><Button variant="primary" size="sm">Get in touch</Button></div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Preview/>);
</script>
</body>
</html>
