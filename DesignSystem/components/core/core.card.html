<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--bg)}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, Badge, Tag, Card } = window.GaryHydeDesignSystem_f38a16;
const sep = {fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text-4)',marginBottom:'8px',letterSpacing:'0.06em'};
const row = {display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'};

function Preview() {
  return (
    <div style={{padding:'20px',display:'flex',flexDirection:'column',gap:'20px'}}>
      <div>
        <div style={sep}>BUTTON — variants</div>
        <div style={row}>
          <Button variant="primary">Primary</Button>
          <Button variant="secondary">Secondary</Button>
          <Button variant="ghost">Ghost</Button>
          <Button variant="danger">Danger</Button>
          <Button variant="primary" disabled>Disabled</Button>
        </div>
      </div>
      <div>
        <div style={sep}>BUTTON — sizes</div>
        <div style={{...row,alignItems:'flex-end'}}>
          <Button variant="primary" size="sm">Small</Button>
          <Button variant="primary" size="md">Medium</Button>
          <Button variant="primary" size="lg">Large</Button>
          <Button variant="secondary" size="sm" rightIcon={<span style={{fontSize:'12px'}}>→</span>}>With icon</Button>
          <Button variant="primary" size="md" fullWidth={false}>Full width demo</Button>
        </div>
      </div>
      <div>
        <div style={sep}>BADGE</div>
        <div style={row}>
          <Badge variant="success" dot>Available for hire</Badge>
          <Badge variant="accent">AI-augmented</Badge>
          <Badge variant="neutral">Side project</Badge>
          <Badge variant="info">In progress</Badge>
          <Badge variant="warning">Beta</Badge>
          <Badge variant="error">Deprecated</Badge>
          <Badge variant="neutral" size="sm">sm size</Badge>
        </div>
      </div>
      <div>
        <div style={sep}>TAG — tech stack</div>
        <div style={row}>
          {['TypeScript','React','Next.js','Node.js','PostgreSQL','OpenAI','Prisma'].map(t=><Tag key={t}>{t}</Tag>)}
          <Tag active>Active filter</Tag>
          <Tag size="sm">sm</Tag>
        </div>
      </div>
      <div>
        <div style={sep}>CARD</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'10px'}}>
          <Card padding="sm">
            <div style={{color:'var(--text-1)',fontSize:'var(--text-sm)',fontWeight:500,marginBottom:'4px'}}>Default</div>
            <div style={{color:'var(--text-3)',fontSize:'var(--text-xs)'}}>surface-1 + border</div>
          </Card>
          <Card padding="sm" hoverable>
            <div style={{color:'var(--text-1)',fontSize:'var(--text-sm)',fontWeight:500,marginBottom:'4px'}}>Hoverable</div>
            <div style={{color:'var(--text-3)',fontSize:'var(--text-xs)'}}>lift on hover</div>
          </Card>
          <Card padding="sm" header={<Badge variant="success" dot size="sm">Shipped</Badge>}>
            <div style={{color:'var(--text-1)',fontSize:'var(--text-sm)',fontWeight:500,marginBottom:'4px'}}>With header</div>
            <div style={{color:'var(--text-3)',fontSize:'var(--text-xs)'}}>slot above body</div>
          </Card>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Preview/>);
</script>
</body>
</html>
