<!-- @dsCard group="Colors" viewport="700x200" name="Neutrals — Zinc" subtitle="Base neutral scale, zinc-950 through zinc-50" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg); margin: 0; padding: 20px; font-family: var(--font-body); }
  .row { display: flex; gap: 6px; }
  .swatch {
    flex: 1; height: 88px; border-radius: var(--radius-sm);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 6px 7px; gap: 1px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .label { font-family: var(--font-mono); font-size: 9.5px; }
  .step  { font-family: var(--font-mono); font-size: 9px; opacity: 0.6; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch" style="background:#09090B">
    <div class="label" style="color:rgba(255,255,255,0.5)">950</div>
    <div class="step" style="color:rgba(255,255,255,0.35)">#09090B</div>
  </div>
  <div class="swatch" style="background:#18181B">
    <div class="label" style="color:rgba(255,255,255,0.5)">900</div>
    <div class="step" style="color:rgba(255,255,255,0.3)">#18181B</div>
  </div>
  <div class="swatch" style="background:#27272A">
    <div class="label" style="color:rgba(255,255,255,0.55)">800</div>
    <div class="step" style="color:rgba(255,255,255,0.35)">#27272A</div>
  </div>
  <div class="swatch" style="background:#3F3F46">
    <div class="label" style="color:rgba(255,255,255,0.6)">700</div>
    <div class="step" style="color:rgba(255,255,255,0.4)">#3F3F46</div>
  </div>
  <div class="swatch" style="background:#52525B">
    <div class="label" style="color:rgba(255,255,255,0.7)">600</div>
    <div class="step" style="color:rgba(255,255,255,0.5)">#52525B</div>
  </div>
  <div class="swatch" style="background:#71717A">
    <div class="label" style="color:rgba(255,255,255,0.8)">500</div>
    <div class="step" style="color:rgba(255,255,255,0.6)">#71717A</div>
  </div>
  <div class="swatch" style="background:#A1A1AA">
    <div class="label" style="color:rgba(9,9,11,0.65)">400</div>
    <div class="step" style="color:rgba(9,9,11,0.5)">#A1A1AA</div>
  </div>
  <div class="swatch" style="background:#D4D4D8">
    <div class="label" style="color:rgba(9,9,11,0.65)">300</div>
    <div class="step" style="color:rgba(9,9,11,0.45)">#D4D4D8</div>
  </div>
  <div class="swatch" style="background:#E4E4E7">
    <div class="label" style="color:rgba(9,9,11,0.6)">200</div>
    <div class="step" style="color:rgba(9,9,11,0.4)">#E4E4E7</div>
  </div>
  <div class="swatch" style="background:#F4F4F5">
    <div class="label" style="color:rgba(9,9,11,0.55)">100</div>
    <div class="step" style="color:rgba(9,9,11,0.4)">#F4F4F5</div>
  </div>
  <div class="swatch" style="background:#FAFAFA">
    <div class="label" style="color:rgba(9,9,11,0.5)">50</div>
    <div class="step" style="color:rgba(9,9,11,0.35)">#FAFAFA</div>
  </div>
</div>
</body>
</html>
