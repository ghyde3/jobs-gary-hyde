<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing Scale" subtitle="4px base unit — space-1 through space-32" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg); margin: 0; padding: 20px 24px; font-family: var(--font-body); }
  .track { display: flex; align-items: flex-end; gap: 6px; }
  .item  { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .bar   { background: var(--color-accent); border-radius: 2px; width: 24px; }
  .val   { font-family: var(--font-mono); font-size: 9px; color: var(--text-4); }
  .px    { font-family: var(--font-mono); font-size: 9px; color: var(--text-3); }
</style>
</head>
<body>
<div class="track">
  <div class="item"><div class="bar" style="height:4px"></div><div class="val">1</div><div class="px">4</div></div>
  <div class="item"><div class="bar" style="height:6px"></div><div class="val">1.5</div><div class="px">6</div></div>
  <div class="item"><div class="bar" style="height:8px"></div><div class="val">2</div><div class="px">8</div></div>
  <div class="item"><div class="bar" style="height:10px"></div><div class="val">2.5</div><div class="px">10</div></div>
  <div class="item"><div class="bar" style="height:12px"></div><div class="val">3</div><div class="px">12</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="val">4</div><div class="px">16</div></div>
  <div class="item"><div class="bar" style="height:20px"></div><div class="val">5</div><div class="px">20</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="val">6</div><div class="px">24</div></div>
  <div class="item"><div class="bar" style="height:28px"></div><div class="val">7</div><div class="px">28</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="val">8</div><div class="px">32</div></div>
  <div class="item"><div class="bar" style="height:40px"></div><div class="val">10</div><div class="px">40</div></div>
  <div class="item"><div class="bar" style="height:48px"></div><div class="val">12</div><div class="px">48</div></div>
  <div class="item"><div class="bar" style="height:56px"></div><div class="val">14</div><div class="px">56</div></div>
  <div class="item"><div class="bar" style="height:64px"></div><div class="val">16</div><div class="px">64</div></div>
  <div class="item"><div class="bar" style="height:80px; opacity:0.6"></div><div class="val">20</div><div class="px">80</div></div>
  <div class="item"><div class="bar" style="height:96px; opacity:0.4"></div><div class="val">24</div><div class="px">96</div></div>
  <div class="item"><div class="bar" style="height:128px; opacity:0.25"></div><div class="val">32</div><div class="px">128</div></div>
</div>
</body>
</html>
