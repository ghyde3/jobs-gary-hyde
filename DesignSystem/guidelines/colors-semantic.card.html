<!-- @dsCard group="Colors" viewport="700x200" name="Semantic Colors" subtitle="Success, error, warning, info — with muted variants" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg); margin: 0; padding: 20px; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .group { display: flex; flex-direction: column; gap: 6px; }
  .swatch-main {
    height: 64px; border-radius: var(--radius-md);
    display: flex; flex-direction: column; justify-content: flex-end; padding: 7px;
  }
  .swatch-muted {
    height: 32px; border-radius: var(--radius-sm);
    display: flex; align-items: center; padding: 0 8px;
  }
  .label { font-family: var(--font-mono); font-size: 10px; font-weight: 600; }
  .sub   { font-family: var(--font-mono); font-size: 9.5px; opacity: 0.65; margin-top: 1px; }
</style>
</head>
<body>
<div class="grid">
  <div class="group">
    <div class="swatch-main" style="background:#22C55E">
      <div class="label" style="color:rgba(9,9,11,0.8)">Success</div>
      <div class="sub" style="color:rgba(9,9,11,0.6)">#22C55E</div>
    </div>
    <div class="swatch-muted" style="background:var(--color-success-muted); border:1px solid var(--color-success-border)">
      <span class="label" style="color:var(--color-success)">--success-muted</span>
    </div>
  </div>
  <div class="group">
    <div class="swatch-main" style="background:#EF4444">
      <div class="label" style="color:rgba(255,255,255,0.9)">Error</div>
      <div class="sub" style="color:rgba(255,255,255,0.65)">#EF4444</div>
    </div>
    <div class="swatch-muted" style="background:var(--color-error-muted); border:1px solid var(--color-error-border)">
      <span class="label" style="color:var(--color-error)">--error-muted</span>
    </div>
  </div>
  <div class="group">
    <div class="swatch-main" style="background:#F59E0B">
      <div class="label" style="color:rgba(9,9,11,0.8)">Warning</div>
      <div class="sub" style="color:rgba(9,9,11,0.6)">#F59E0B</div>
    </div>
    <div class="swatch-muted" style="background:var(--color-warning-muted); border:1px solid var(--color-accent-border)">
      <span class="label" style="color:var(--color-warning)">--warning-muted</span>
    </div>
  </div>
  <div class="group">
    <div class="swatch-main" style="background:#3B82F6">
      <div class="label" style="color:rgba(255,255,255,0.9)">Info</div>
      <div class="sub" style="color:rgba(255,255,255,0.65)">#3B82F6</div>
    </div>
    <div class="swatch-muted" style="background:var(--color-info-muted); border:1px solid var(--color-info-border)">
      <span class="label" style="color:var(--color-info)">--info-muted</span>
    </div>
  </div>
</div>
</body>
</html>
