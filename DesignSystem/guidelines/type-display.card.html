<!-- @dsCard group="Type" viewport="700x220" name="Display — Space Grotesk" subtitle="Headings, hero text, monogram — Space Grotesk 300–700" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg); margin: 0; padding: 20px 24px; font-family: var(--font-display); color: var(--text-1); }
  .hero  { font-size: var(--text-5xl); font-weight: var(--weight-bold); line-height: var(--leading-tight); letter-spacing: var(--tracking-tight); margin-bottom: 10px; }
  .sub   { font-size: var(--text-2xl); font-weight: var(--weight-semibold); line-height: var(--leading-snug); letter-spacing: var(--tracking-snug); color: var(--text-2); margin-bottom: 10px; }
  .meta  { display: flex; gap: 16px; align-items: baseline; }
  .meta span { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-4); }
  .accent { color: var(--color-accent); }
</style>
</head>
<body>
<div class="hero">Senior Full&#8209;Stack<br><span class="accent">Developer</span></div>
<div class="sub">10+ years shipping production web apps</div>
<div class="meta">
  <span>Space Grotesk</span>
  <span>300 · 400 · 500 · 600 · 700</span>
  <span>tracking −0.025em</span>
  <span>leading 1.15</span>
</div>
</body>
</html>
