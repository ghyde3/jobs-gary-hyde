<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg); margin: 0; padding: 24px; font-family: var(--font-body); }
  .row { display: flex; align-items: center; gap: 32px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
  .bg-dark  { background: var(--bg); padding: 16px 20px; border-radius: var(--radius-md); border: 1px solid var(--border); }
  .bg-light { background: #F4F4F5; padding: 16px 20px; border-radius: var(--radius-md); }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--text-4); }
  img, object { display: block; }
</style>
</head>
<body>
<div class="row">
  <div class="item">
    <div class="bg-dark"><img src="../assets/logo.svg" width="40" height="40" alt="GH monogram"></div>
    <span class="label">Monogram — dark bg</span>
  </div>
  <div class="item">
    <div class="bg-dark"><img src="../assets/logo-wordmark.svg" width="160" height="40" alt="Gary Hyde wordmark"></div>
    <span class="label">Wordmark — dark bg</span>
  </div>
  <div class="item">
    <div class="bg-light"><img src="../assets/logo.svg" width="40" height="40" alt="GH monogram"></div>
    <span class="label">Monogram — light bg</span>
  </div>
  <div class="item" style="margin-left:auto">
    <div style="background:var(--surface-1);padding:12px 16px;border-radius:var(--radius-md);border:1px solid var(--border)">
      <div style="font-family:var(--font-display);font-size:32px;font-weight:700;letter-spacing:-0.03em;color:var(--color-accent);line-height:1">GH</div>
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--text-4);margin-top:6px">Space Grotesk 700 · Amber</div>
    </div>
    <span class="label">Monogram — text form</span>
  </div>
</div>
</body>
</html>
